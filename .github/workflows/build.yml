name: Android APK Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.9'

    - name: Create Dummy Properties File
      run: touch local.defaults.properties


      - name: Generate Gradle wrapper
        run: gradle wrapper --gradle-version 8.9 --distribution-type bin

      - name: Inject Maps API key (if provided)
        env:
          MAPS_API_KEY: ${{ secrets.MAPS_API_KEY }}
        run: |
          if [ -n "$MAPS_API_KEY" ]; then
            echo "MAPS_API_KEY=$MAPS_API_KEY" > app/secrets.properties
          fi

      - name: Build debug APK
        run: ./gradlew :app:assembleDebug --no-daemon --stacktrace

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: SimpleLock-debug-apk
          path: app/build/outputs/apk/debug/*.apk
          if-no-files-found: error
